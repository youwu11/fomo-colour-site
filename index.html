<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>FOMO Auto · Car Wrap Colour Gallery</title>
<style>
:root{--bg:#0d0e11;--bg2:#15171c;--card:#181a20;--line:#262932;--txt:#f2f3f5;--mut:#9aa0ab;--accent:#ffd21e;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.4}
header{position:sticky;top:0;z-index:30;background:rgba(13,14,17,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:center;gap:14px;padding:14px 20px;max-width:1500px;margin:0 auto}
.logo{display:flex;align-items:baseline;gap:8px;font-weight:800;letter-spacing:.5px}
.logo .f{background:var(--accent);color:#1a1a1a;padding:3px 9px;border-radius:7px;font-size:20px;line-height:1}
.logo .sub{font-size:11px;color:var(--mut);font-weight:600;letter-spacing:2px;text-transform:uppercase}
.search{margin-left:auto;position:relative}
.search input{background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:9px 14px 9px 34px;border-radius:9px;font-size:14px;width:230px;outline:none}
.search input:focus{border-color:var(--accent)}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.5}
.filters{max-width:1500px;margin:0 auto;padding:0 20px 12px}
.frow{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:8px}
.flabel{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:1.5px;width:60px;flex:none}
.chip{border:1px solid var(--line);background:var(--card);color:var(--mut);padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap;transition:.15s}
.chip:hover{color:var(--txt);border-color:#3a3f4b}
.chip.on{background:var(--accent);border-color:var(--accent);color:#1a1a1a;font-weight:600}
.chip .c{opacity:.6;font-size:11px;margin-left:3px}
.count{max-width:1500px;margin:0 auto;padding:6px 20px 0;color:var(--mut);font-size:13px}
.grid{max-width:1500px;margin:0 auto;padding:16px 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:.18s}
.card:hover{transform:translateY(-3px);border-color:#3a3f4b;box-shadow:0 12px 30px rgba(0,0,0,.4)}
.thumb{position:relative;aspect-ratio:1/1;background:var(--bg2);overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);color:#fff;font-size:11px;padding:2px 7px;border-radius:20px}
.meta{padding:11px 13px 13px}
.cname{font-size:15px;font-weight:600}
.cfin{font-size:12px;color:var(--mut);margin-top:2px}
.empty{grid-column:1/-1;text-align:center;color:var(--mut);padding:60px 0}
footer{border-top:1px solid var(--line);padding:24px 20px 40px;text-align:center;color:var(--mut);font-size:13px}
footer b{color:var(--txt)}
.lb{position:fixed;inset:0;z-index:100;background:rgba(8,9,11,.96);display:none;flex-direction:column}
.lb.open{display:flex}
.lbtop{display:flex;align-items:center;gap:12px;padding:16px 20px}
.lbname{font-size:18px;font-weight:700}
.lbtag{font-size:12px;color:var(--mut);border:1px solid var(--line);padding:3px 9px;border-radius:20px}
.lbclose{margin-left:auto;background:var(--card);border:1px solid var(--line);color:var(--txt);width:38px;height:38px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lbmain{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0;padding:0 10px}
.lbmain img{max-width:100%;max-height:100%;object-fit:contain;border-radius:10px}
.nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);border:1px solid var(--line);color:#fff;width:46px;height:46px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav:hover{background:var(--accent);border-color:var(--accent);color:#1a1a1a}
.prev{left:14px}.next{right:14px}
.counter{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);padding:4px 12px;border-radius:20px;font-size:13px;color:#fff}
.strip{display:flex;gap:8px;padding:12px 20px 20px;overflow-x:auto;justify-content:center}
.strip img{height:56px;width:56px;object-fit:cover;border-radius:8px;cursor:pointer;opacity:.5;border:2px solid transparent;flex:none}
.strip img.on{opacity:1;border-color:var(--accent)}
@media(max-width:640px){
.search input{width:150px}
.bar{flex-wrap:wrap;gap:10px}
.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px;padding:14px 12px 50px}
.filters{padding:0 12px 10px}.flabel{width:100%}.count{padding-left:12px}
.cname{font-size:14px}
}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo"><span class="f">FOMO</span><span class="sub">Car Wrap Colour Gallery</span></div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>

</header>
<main><div class="grid" id="grid"></div></main>
<footer>Curated by <b>FOMO Auto</b> · Custom Wraps &amp; Detailing · Sydney<br/><span style="font-size:12px">Colours shown are real-world installs. Final appearance varies with surface, light &amp; finish.</span></footer>

    <div class="counter" id="counter"></div>
  </div>
  <div class="strip" id="strip"></div>
</div>

const colors=DATA.colors;
let famF="All",finF="All",q="";
const grid=document.getElementById("grid"),countEl=document.getElementById("count");
function counts(key,order){const m={};colors.forEach(c=>m[c[key]]=(m[c[key]]||0)+1);
  return ["All",...order].map(v=>[v,v==="All"?colors.length:(m[v]||0)]);}
function buildChips(rowId,key,order,cur,set){
  const row=document.getElementById(rowId);
  counts(key,order).forEach(([v,n])=>{
    const b=document.createElement("button");b.className="chip"+(v===cur()?" on":"");
    b.innerHTML=v+'<span class="c">'+n+'</span>';
    b.onclick=()=>{set(v);refreshChips();render();};row.appendChild(b);
  });
}
function refreshChips(){
  document.querySelectorAll("#famRow .chip").forEach(b=>b.classList.toggle("on",b.textContent.replace(/\d+$/,"").trim()===famF));
  document.querySelectorAll("#finRow .chip").forEach(b=>b.classList.toggle("on",b.textContent.replace(/\d+$/,"").trim()===finF));
}
function match(c){return (famF==="All"||c.family===famF)&&(finF==="All"||c.finish===finF)&&(!q||c.name.toLowerCase().includes(q));}
function render(){
  const list=colors.filter(match);
  grid.innerHTML="";
  countEl.textContent=list.length+" colour"+(list.length!==1?"s":"");
  if(!list.length){grid.innerHTML='<div class="empty">No colours match your filters.</div>';return;}
  list.forEach(c=>{
    const idx=colors.indexOf(c);
    const card=document.createElement("div");card.className="card";card.onclick=()=>openLB(idx);
    card.innerHTML='<div class="thumb"><img loading="lazy" src="'+enc(c.cover)+'" alt="'+c.name+'"/>'+
      (c.n>1?'<span class="badge">'+c.n+' photos</span>':'')+'</div>'+
      '<div class="meta"><div class="cname">'+c.name+'</div><div class="cfin">'+c.finish+' · '+c.family+'</div></div>';
    grid.appendChild(card);
  });
}
function enc(p){return p.split("/").map(encodeURIComponent).join("/");}
const lb=document.getElementById("lb"),lbimg=document.getElementById("lbimg"),lbname=document.getElementById("lbname"),
lbtag=document.getElementById("lbtag"),strip=document.getElementById("strip"),counter=document.getElementById("counter");
let cur=0,gi=0;
function openLB(i){cur=i;gi=0;showLB();lb.classList.add("open");document.body.style.overflow="hidden";}
function showLB(){
  const c=colors[cur];lbname.textContent=c.name;lbtag.textContent=c.finish+" · "+c.family;
  lbimg.src=enc(c.gallery[gi]);
  counter.textContent=(gi+1)+" / "+c.gallery.length;
  counter.style.display=c.gallery.length>1?"block":"none";
  document.getElementById("prev").style.display=document.getElementById("next").style.display=c.gallery.length>1?"flex":"none";
  strip.innerHTML="";
  if(c.gallery.length>1)c.gallery.forEach((g,k)=>{const t=document.createElement("img");t.src=enc(g);t.className=k===gi?"on":"";t.onclick=()=>{gi=k;showLB();};strip.appendChild(t);});
}
function closeLB(){lb.classList.remove("open");document.body.style.overflow="";}
function step(d){const g=colors[cur].gallery;gi=(gi+d+g.length)%g.length;showLB();}
document.getElementById("lbclose").onclick=closeLB;
document.getElementById("prev").onclick=()=>step(-1);
document.getElementById("next").onclick=()=>step(1);
lb.onclick=e=>{if(e.target===lb||e.target.classList.contains("lbmain"))closeLB();};
document.addEventListener("keydown",e=>{if(!lb.classList.contains("open"))return;
  if(e.key==="Escape")closeLB();else if(e.key==="ArrowRight")step(1);else if(e.key==="ArrowLeft")step(-1);});
let sx=0;lb.addEventListener("touchstart",e=>sx=e.touches[0].clientX,{passive:true});
lb.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50)step(dx<0?1:-1);},{passive:true});
document.getElementById("q").addEventListener("input",e=>{q=e.target.value.toLowerCase().trim();render();});
buildChips("famRow","family",DATA.famOrder,()=>famF,v=>famF=v);
buildChips("finRow","finish",DATA.finOrder,()=>finF,v=>finF=v);
render();
</script>
